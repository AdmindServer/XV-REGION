<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>XV-REGION SENDER</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#050505;
color:white;
overflow:hidden;
}

/* BACKGROUND */

.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:
linear-gradient(
to bottom,
rgba(0,0,0,.5),
rgba(0,0,0,.95)
),
url('XV.jpg');
background-size:cover;
background-position:center;
filter:blur(2px);
z-index:-2;
pointer-events:none;
}

.redGlow{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(
circle,
rgba(255,0,0,.15),
transparent 70%
);
z-index:-1;
animation:pulse 4s infinite;
pointer-events:none;
}

@keyframes pulse{
50%{
opacity:.4;
}
}

/* HEADER */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:18px;
background:rgba(0,0,0,.45);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,0,0,.2);
}

.logoBox{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:55px;
height:55px;
border-radius:50%;
border:2px solid #ff1f1f;
box-shadow:0 0 20px red;
object-fit:cover;
}

.title h1{
font-size:20px;
color:white;
}

.title p{
font-size:11px;
color:#ff4d4d;
}

/* CARD */

.main{
padding:20px;
overflow:auto;
height:calc(100vh - 80px);
padding-bottom:130px;
}

.card{
background:rgba(20,0,0,.7);
border:1px solid rgba(255,0,0,.2);
border-radius:25px;
padding:20px;
margin-bottom:20px;
box-shadow:
0 0 30px rgba(255,0,0,.1);
backdrop-filter:blur(10px);
}

.card h2{
font-size:24px;
margin-bottom:10px;
color:#ff4d4d;
}

.card p{
font-size:13px;
opacity:.8;
line-height:1.6;
}

/* INPUT */

.inputBox{
margin-top:20px;
}

.inputBox input{
width:100%;
padding:18px;
border:none;
outline:none;
border-radius:20px;
background:#111;
color:white;
font-size:18px;
border:2px solid rgba(255,0,0,.3);
}

.inputBox input:focus{
border-color:#ff1f1f;
box-shadow:0 0 20px red;
}

/* BUTTON */

.btn{
margin-top:20px;
width:100%;
padding:18px;
border:none;
border-radius:20px;
background:
linear-gradient(
45deg,
#ff1f1f,
#8b0000
);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 25px rgba(255,0,0,.5);
transition:.3s;
}

.btn:active{
transform:scale(.95);
}

/* STATUS */

.status{
margin-top:15px;
padding:15px;
border-radius:15px;
background:rgba(255,0,0,.1);
border:1px solid rgba(255,0,0,.2);
font-size:13px;
}

/* POPUP */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(.7);
width:90%;
max-width:400px;
background:#120000;
border-radius:30px;
padding:25px;
border:2px solid rgba(255,0,0,.3);
box-shadow:0 0 40px rgba(255,0,0,.5);
z-index:999;
opacity:0;
pointer-events:none;
transition:.3s;
}

.popup.show{
opacity:1;
pointer-events:auto;
transform:translate(-50%,-50%) scale(1);
}

.popup h1{
font-size:38px;
text-align:center;
margin-bottom:20px;
color:white;
}

.number{
text-align:center;
font-size:14px;
margin-bottom:25px;
opacity:.8;
}

.code{
background:black;
padding:25px;
border-radius:25px;
text-align:center;
font-size:45px;
letter-spacing:8px;
font-weight:bold;
color:#ff4d4d;
border:3px solid #ff3b3b;
box-shadow:0 0 25px rgba(255,0,0,.5);
}

.popupButtons{
display:flex;
justify-content:space-between;
margin-top:25px;
gap:15px;
}

.popupButtons button{
flex:1;
padding:15px;
border:none;
border-radius:15px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.copyBtn{
background:#ff2a2a;
color:white;
}

.closeBtn{
background:#222;
color:white;
}

/* BOTTOM NAV */

.bottomNav{
position:fixed;
bottom:0;
left:0;
width:100%;
height:85px;
background:rgba(10,0,0,.95);
display:flex;
justify-content:space-around;
align-items:center;
border-top:2px solid rgba(255,0,0,.2);
backdrop-filter:blur(10px);
}

.navItem{
display:flex;
flex-direction:column;
align-items:center;
font-size:12px;
color:white;
opacity:.7;
}

.navItem.active{
color:#ff3b3b;
opacity:1;
}

.navItem i{
font-size:28px;
margin-bottom:5px;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="redGlow"></div>

<header>

<div class="logoBox">

<img src="logo.png" class="logo">

<div class="title">
<h1>XV-REGION</h1>
<p>PREMIUM WHATSAPP TOOLS</p>
</div>

</div>

<div style="font-size:28px;color:#ff3b3b;">
☰
</div>

</header>

<div class="main">

<div class="card">

<h2>Manage Sender</h2>

<p>
Hubungkan sender WhatsApp untuk mengaktifkan akses premium XV-REGION.
</p>

<div class="inputBox">

<input
type="number"
id="nomor"
placeholder="628xxxxxxxxxx"
>

</div>

<button
class="btn"
onclick="generateCode()"
>
PAIRING SENDER
</button>

<!-- STATUS -->
<div
id="senderStatus"
style="
margin-top:15px;
color:#00ff88;
font-size:15px;
text-align:center;
font-family:monospace;
">
🔴 Sender Belum Aktif
</div>
  
<div class="status">
Status : Waiting Pairing...
</div>

</div>

<div class="card">

<h2>Info</h2>

<p>
Sender backend aktif dan siap pairing.
</p>

</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<h1>PAIRING REQUIRED</h1>

<div class="number" id="showNumber">
Number :
</div>

<div class="code" id="pairCode">
ORCALELO
</div>

<div class="popupButtons">

<button
class="copyBtn"
onclick="copyCode()"
>
COPY
</button>

<button
class="closeBtn"
onclick="closePopup()"
>
CLOSE
</button>

</div>

</div>

<!-- NAV -->

<div class="bottomNav">

<div class="navItem active">
<i>⌂</i>
<span>Home</span>
</div>

<div class="navItem">
<i>☎</i>
<span>WA Blast</span>
</div>

<div class="navItem">
<i>⚡</i>
<span>Info</span>
</div>

<div class="navItem">
<i>☰</i>
<span>Tools</span>
</div>

</div>

<script>

async function generateCode(){

let nomor =
document.getElementById(
"nomor"
).value;

if(!nomor){

alert(
"Masukkan nomor dulu!"
);

return;

}

/* POPUP LANGSUNG */

document
.getElementById(
"popup"
)
.classList.add(
"show"
);

document
.getElementById(
"showNumber"
)
.innerHTML =
"Number : " + nomor;

document
.getElementById(
"pairCode"
)
.innerHTML =
"LOADING...";

try{

let req =
await fetch(

"http://127.0.0.1:3000/pair?no="+nomor

);

let res =
await req.json();

  if(
res.code &&
res.code !== "ERROR"
){

document
.getElementById(
"senderStatus"
)
.innerHTML =

"🟢 Sender Aktif : " + nomor;

}
  
/* UPDATE CODE */

document
.getElementById(
"pairCode"
)
.innerHTML =
res.code;

}catch(err){

document
.getElementById(
"pairCode"
)
.innerHTML =
"ERROR";

console.log(err);

}

  }

function closePopup(){

document.getElementById(
"popup"
).classList.remove(
"show"
);

}

function copyCode(){

let code =
document.getElementById(
"pairCode"
).innerText;

navigator.clipboard.writeText(
code
);

alert(
"Code copied!"
);

}

</script>

</body>
</html>
